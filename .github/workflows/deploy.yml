name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Clone Quartz v5
        run: git clone --depth 1 --branch v5 https://github.com/jackyzha0/quartz.git .quartz-build

      - name: Copy content and config
        run: |
          rm -rf .quartz-build/content
          cp -R content .quartz-build/content
          cp quartz.config.yaml .quartz-build/quartz.config.yaml

      - name: Install dependencies
        working-directory: .quartz-build
        run: npm ci

      - name: Install Quartz plugins
        working-directory: .quartz-build
        run: npx quartz plugin install --from-config

      - name: Build Quartz
        working-directory: .quartz-build
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .quartz-build/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
